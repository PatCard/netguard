services:

  backend:
    ports:
      - "8000:8000"
    environment:
      APP_ENV: production
      APP_DEBUG: false
    restart: always

  agent:
    ports:
      - "5000:5000"
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      FLASK_ENV: production
    restart: always

  frontend:
    ports:
      - "80:80"
    restart: always