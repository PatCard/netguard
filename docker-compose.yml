services:

  mysql:
    image: mysql:8.0
    container_name: netguard_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - netguard_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netguard_backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - netguard_network

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: netguard_worker
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - netguard_network
    command: php artisan queue:work --timeout=600

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: netguard_agent
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - netguard_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: netguard_frontend
    restart: unless-stopped
    depends_on:
      - backend
      - agent
    networks:
      - netguard_network

  mcp:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: netguard_mcp
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - netguard_network
    command: python mcp_server.py

volumes:
  mysql_data:

networks:
  netguard_network:
    driver: bridge
